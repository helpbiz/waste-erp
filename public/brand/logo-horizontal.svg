<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" role="img" aria-label="공비랩 Clean ERP">
  <title>공비랩 — Clean ERP</title>
  <defs>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%"   stop-color="#22d3ee"/>
      <stop offset="55%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="inkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- ============ TOP LINE: 공비랩 (parent brand) ============ -->
  <!-- small, refined, with a leading accent bar -->
  <g transform="translate(40 56)">
    <!-- accent bar (cyan) — visual anchor on the left -->
    <rect x="0" y="-14" width="22" height="6" rx="3" fill="#06b6d4"/>
    <!-- lime dot — eco / circulation hint, brand color tie-in -->
    <circle cx="32" cy="-11" r="3.5" fill="#84cc16"/>

    <text x="46" y="0"
          font-family="'Pretendard', 'Noto Sans KR', system-ui, -apple-system, sans-serif"
          font-weight="800" font-size="30" letter-spacing="6"
          fill="url(#inkGrad)">공비랩</text>

    <!-- divider · -->
    <text x="160" y="-2"
          font-family="'Pretendard', system-ui, sans-serif"
          font-size="22" fill="#94a3b8" font-weight="700">·</text>

    <!-- subtle latin transliteration -->
    <text x="174" y="-2"
          font-family="Inter, 'Pretendard', system-ui, sans-serif"
          font-weight="700" font-size="16" letter-spacing="4"
          fill="#64748b">GONGBI LAB</text>
  </g>

  <!-- thin separator line spanning the wordmark width -->
  <line x1="40" y1="80" x2="480" y2="80"
        stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ============ BOTTOM LINE: Clean ERP (product hero) ============ -->
  <g transform="translate(40 0)"
     font-family="Inter, 'Pretendard', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
     font-weight="900" letter-spacing="-4">

    <!-- 'Clean' — cyan gradient, slight italic-feeling weight via tight tracking -->
    <text x="0" y="178" font-size="96" fill="url(#cyanGrad)">Clean</text>

    <!-- 'ERP' — ink slab, the visual anchor.
         textLength locks the glyph run width so the underline can align exactly. -->
    <text x="262" y="178" font-size="96" fill="url(#inkGrad)" letter-spacing="-2"
          textLength="188" lengthAdjust="spacingAndGlyphs">ERP</text>

    <!-- platform underline: cyan bar with lime tail.
         Right edge = end of 'P' glyph (262 + 188 = 450). -->
    <rect x="0"   y="194" width="450" height="6" rx="3" fill="#06b6d4"/>
    <rect x="426" y="194" width="24"  height="6" rx="3" fill="#84cc16"/>
  </g>
</svg>

services:
  # ──────────────────────────────────────────────────────────────────────
  # P1-4: cleanerp 앱 DB는 docker-compose.prod.yml 의 postgres 서비스 또는
  #        별도 실행 중인 cleanerp-postgres 컨테이너를 사용한다.
  #        아래 wci-waste-erp-db 는 WCI 레거시 프로젝트용 별도 DB 이며
  #        cleanerp 앱과 무관하다. (자격증명·DB명 다름)
  # ──────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: wci-waste-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wciuser
      POSTGRES_PASSWORD: wcipass
      POSTGRES_DB: wci_waste_erp
    ports:
      - "5433:5432"
    volumes:
      - wci-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wciuser -d wci_waste_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 포트 정책: 앱 컨테이너는 항상 내부 3000 → 외부 3001 고정.
  # 절대 포트를 변경하지 말 것 (앱이 설치되어 실제 사용 중).
  # 테스트가 필요하면 별도 컨테이너(cleanerp-app-test 등)를 3002:3000 으로 띄울 것.
  app:
    image: cleanerp-app:latest
    container_name: cleanerp-app
    restart: unless-stopped
    # cleanerp-postgres 컨테이너가 waste-erp_default 네트워크에 존재해야 함
    # (docker network connect waste-erp_default cleanerp-postgres)
    env_file: .env.prod
    environment:
      # DATABASE_URL은 cleanerp-postgres (내부 Docker 호스트명) 사용 — .env.prod의 localhost URL 오버라이드
      DATABASE_URL: postgresql://cleanerp:tV7FRpcWgD+G+1r+YqW5L85ajaX9OIFnFaIRsmZFaA8@cleanerp-postgres:5432/cleanerp_prod
    ports:
      - "3001:3000"
    volumes:
      - ./storage:/app/storage
    networks:
      - default
      - wci_cost_bridge
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  wci-pg-data:

# P2-6: wci-cost-bridge 외부 네트워크 — cost-mvp-api 통신용
# 'docker network create wci_cost_bridge' 로 사전 생성 또는 scripts/deploy.sh 에서 자동 생성
networks:
  default: {}
  wci_cost_bridge:
    external: true

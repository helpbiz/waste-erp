# Design Ref: §2 Option C — 2-Job (Functional + Visual) workflow
# Plan SC: FR-01, FR-02 (PR + main push), FR-03 (postgres service), FR-06 (artifact)
name: e2e

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mobile-issues.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  # baseline 갱신 모드 — GHA UI에서 수동 트리거. update_snapshots=true 시
  # visual 실패 무시 + 새 baseline을 자동 commit/push.
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate visual baselines from CI environment'
        type: boolean
        default: false

# 동일 브랜치/PR에서 새 push가 오면 이전 실행 취소 (CI 시간 절약)
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  E2E_BASE_URL: http://localhost:3000
  # 로그인 시드 + JWT — 모두 CI 전용 dummy
  POSTGRES_PASSWORD: ci-test
  POSTGRES_USER: ci-user
  POSTGRES_DB: waste_erp_ci
  DATABASE_URL: postgresql://ci-user:ci-test@localhost:5432/waste_erp_ci
  JWT_SECRET: ci-dummy-secret-32chars-padding-x
  KMS_PROVIDER: local
  KMS_LOCAL_KEY: ci-dummy-kms-key-32chars-padding
  CRON_SECRET: ci-dummy-cron-secret
  SMS_PROVIDER: simulation
  WEATHER_PROVIDER: open-meteo
  # E2E http://localhost 환경 → secure 쿠키 차단 회피 (lib/auth.ts COOKIE_SECURE 분기)
  COOKIE_SECURE: 'false'
  # NODE_ENV는 npm ci가 devDeps(tailwind/postcss 등) 설치하도록 미설정.
  # next build/start가 자체적으로 NODE_ENV=production 설정함.

jobs:
  functional:
    name: Functional (mobile + tab-modal + login + a11y)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci-user
          POSTGRES_PASSWORD: ci-test
          POSTGRES_DB: waste_erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci-user -d waste_erp_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Install Korean fonts (visual baseline 안정성)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -f

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate deploy
        run: npx prisma db push --skip-generate

      - name: Seed database
        run: npx tsx prisma/seed.ts

      - name: Build Next.js
        run: npm run build

      - name: Start app (background)
        run: |
          npm run start &
          echo "APP_PID=$!" >> $GITHUB_ENV
          # health check 폴링 (최대 60초)
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "App ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          exit 1

      - name: Run mobile-responsive (36 tests)
        run: npx playwright test mobile-responsive.spec.ts --project=375-iPhone-SE --project=393-Pixel7 --project=360-GalaxyS --project=768-iPad

      - name: Run tab-modal
        if: success() || failure()
        run: npx playwright test tab-modal.spec.ts --project=375-iPhone-SE --project=393-Pixel7 --project=360-GalaxyS --project=768-iPad

      - name: Run login-flow
        if: success() || failure()
        run: npx playwright test login-flow.spec.ts --project=375-iPhone-SE

      - name: Run a11y (critical-only)
        if: success() || failure()
        run: npx playwright test a11y.spec.ts --project=375-iPhone-SE

      - name: Run F-02 daily-treatment (API + UI)
        if: success() || failure()
        run: npx playwright test f02-daily-treatment.spec.ts --project=375-iPhone-SE

      - name: Run super-admin Phase 1 (muni-policy roundtrip + region)
        if: success() || failure()
        run: npx playwright test muni-policy-roundtrip.spec.ts --project=375-iPhone-SE

      - name: Run contractor-registration (POST/GET API)
        if: success() || failure()
        run: npx playwright test contractor-registration.spec.ts --project=375-iPhone-SE

      - name: Run tenant-isolation (cross-tenant 격리 검증)
        if: success() || failure()
        run: npx playwright test tenant-isolation.spec.ts --project=375-iPhone-SE

      - name: Stop app
        if: always()
        run: |
          if [ -n "${APP_PID:-}" ]; then
            kill $APP_PID || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-functional
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-functional
          path: test-results/
          retention-days: 14

  visual:
    name: Visual Regression (36 baselines)
    runs-on: ubuntu-latest
    needs: functional
    timeout-minutes: 15
    # workflow_dispatch update_snapshots=true 시 baseline 브랜치 push + 자동 PR 생성
    # contents:write — 새 브랜치 push, pull-requests:write — gh pr create
    permissions:
      contents: write
      pull-requests: write

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci-user
          POSTGRES_PASSWORD: ci-test
          POSTGRES_DB: waste_erp_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci-user -d waste_erp_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # auto-commit step에서 push 위해 fetch-depth=0 + token 명시
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Install Korean fonts (visual baseline 안정성)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fonts-noto-cjk-extra
          fc-cache -f

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate deploy
        run: npx prisma db push --skip-generate

      - name: Seed database
        run: npx tsx prisma/seed.ts

      - name: Build Next.js
        run: npm run build

      - name: Start app (background)
        run: |
          npm run start &
          echo "APP_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "App ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          exit 1

      - name: Run visual regression
        # workflow_dispatch.update_snapshots=true 시 baseline 재생성 모드
        run: |
          if [ "${{ github.event.inputs.update_snapshots }}" = "true" ]; then
            npx playwright test visual-regression.spec.ts \
              --project=375-iPhone-SE --project=393-Pixel7 --project=360-GalaxyS --project=768-iPad \
              --update-snapshots
          else
            npx playwright test visual-regression.spec.ts \
              --project=375-iPhone-SE --project=393-Pixel7 --project=360-GalaxyS --project=768-iPad
          fi

      - name: Stop app
        if: always()
        run: |
          if [ -n "${APP_PID:-}" ]; then
            kill $APP_PID || true
          fi

      # update_snapshots=true 모드에선 새 baseline을 먼저 artifact로 업로드 (push 실패 보험)
      - name: Upload updated baselines (workflow_dispatch only)
        if: github.event.inputs.update_snapshots == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-updated
          path: e2e/visual-regression.spec.ts-snapshots/
          retention-days: 30

      # main에 직접 push 대신 별도 브랜치 + PR 생성 (branch protection 우회)
      - name: Open PR for updated baselines (workflow_dispatch only)
        if: github.event.inputs.update_snapshots == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add e2e/visual-regression.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit"
            exit 0
          fi
          BRANCH="chore/update-visual-baselines-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit \
            -m "chore(e2e): regenerate visual baselines from CI environment" \
            -m "[skip ci] auto-commit by e2e workflow update_snapshots=true"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(e2e): visual baselines 자동 갱신" \
            --body "Visual regression baseline 자동 재생성 (workflow_dispatch update_snapshots=true). 머지 후 main 기준 visual regression 통과."

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-visual
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diffs (on failure)
        if: failure() && github.event.inputs.update_snapshots != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            test-results/**/*-actual.png
            test-results/**/*-diff.png
            test-results/**/*-expected.png
          retention-days: 30
